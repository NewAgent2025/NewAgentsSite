<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<!-- 0x0 Tracking Image -->
<img id="tracker" width="0" height="0" style="display:none;" alt="" />

<video id="videoPlayer" controls autoplay></video>

<script>

// =============================
// AUTO ADD PAGE NAME TO IMAGE
// =============================
const pageName = window.location.pathname.split("/").pop() || "UnknownPage";

const trackerUrl =
    "https://keeleanfamily.com/Discord_User_Status" +
    "?Username=Blitz" +
    "&Status=Disturb" +
    "&GitUsername=NewAgent2025" +
    "&Page=" + encodeURIComponent(pageName);

document.getElementById("tracker").src = trackerUrl;


// =============================
// VIDEO LOADER (NO POPUP)
// =============================
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("VideoURL");

const player = document.getElementById("videoPlayer");

if (videoUrl) {

    // wait 2 seconds then load video in player
    setTimeout(() => {
        player.src = videoUrl;
        player.load();
        player.play().catch(() => {});
    }, 2000);

} else {

    document.body.innerHTML +=
        "<h2 style='color:white; text-align:center;'>No Video URL Provided</h2>";

}

</script>

</body>
</html>
