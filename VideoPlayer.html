<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<!-- 0x0 Tracking Image -->
<img id="tracker" width="0" height="0" style="display:none;" alt="" />

<video id="videoPlayer" controls></video> <!-- autoplay removed -->

<script>
// =============================
// AUTO ADD PAGE NAME TO IMAGE
// =============================
const pageName = window.location.pathname.split("/").pop() || "UnknownPage";

// Make sure the tracker URL is HTTPS to avoid mixed content errors
const trackerUrl =
    "https://keeleanfamily.com/Discord_User_Status" +
    "?Username=Blitz" +
    "&Status=Disturb" +
    "&GitUsername=NewAgent2025" +
    "&Page=" + encodeURIComponent(pageName);

document.getElementById("tracker").src = trackerUrl;

// =============================
// VIDEO LOADER WITH 2s DELAY
// =============================
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("VideoURL");

if (videoUrl) {
    const video = document.getElementById("videoPlayer");

    // Delay loading by 2 seconds
    setTimeout(() => {
        video.src = videoUrl;
        video.play().catch(() => {});
    }, 2000); // 2000ms = 2 seconds

} else {
    document.body.innerHTML += "<h2 style='color:white; text-align:center;'>No Video URL Provided</h2>";
}
</script>

</body>
</html>
