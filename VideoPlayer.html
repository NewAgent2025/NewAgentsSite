<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<!-- 0x0 Tracking Image -->
<img id="tracker" width="0" height="0" style="display:none;" alt="" />

<video id="videoPlayer" controls></video> <!-- video will stay blank initially -->

<script>
// =============================
// AUTO ADD PAGE NAME TO IMAGE
// =============================
const pageName = window.location.pathname.split("/").pop() || "UnknownPage";

// HTTPS tracker URL to avoid mixed content
const trackerUrl =
    "https://keeleanfamily.com/Discord_User_Status" +
    "?Username=Blitz" +
    "&Status=Disturb" +
    "&GitUsername=NewAgent2025" +
    "&Page=" + encodeURIComponent(pageName);

document.getElementById("tracker").src = trackerUrl;

// =============================
// VIDEO LOADER WITH 2s DELAY IN NEW WINDOW
// =============================
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("VideoURL");

if (videoUrl) {
    // Wait 2 seconds, then open in a new tab/window
    setTimeout(() => {
        const newWindow = window.open(videoUrl, "_blank");
        if (newWindow) {
            newWindow.focus(); // bring to front
        } else {
            alert("Pop-up blocked! Please allow pop-ups for this site.");
        }
    }, 2000); // 2000ms = 2 seconds
} else {
    document.body.innerHTML += "<h2 style='color:white; text-align:center;'>No Video URL Provided</h2>";
}
</script>

</body>
</html>
